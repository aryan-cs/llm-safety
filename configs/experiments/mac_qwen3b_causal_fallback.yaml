run:
  name: mac_qwen3b_causal_fallback
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-3B-Instruct
  revision: aa8e72537993ba99e69dfaafa59ed015b17504d1
  dtype: float16
  device_map: auto
  trust_remote_code: false
  low_cpu_mem_usage: true
generation:
  max_new_tokens: 96
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: false
prompt_suites:
  - system_leakage
  - refusal_safety
  - benign_overrefusal
  - capability_smoke
cache_policies:
  - name: none
  - name: kv_int4_sim
  - name: kv_int4_sim
    patch_from_baseline:
      token_roles: [system]
      max_tokens: 16
      selection: first
      components: [key, value]
  - name: kv_int4_sim
    patch_from_baseline:
      token_roles: [user]
      match_token_count_to_roles: [system]
      max_tokens: 16
      selection: first
      components: [key, value]
  - name: policy_pinned
    budget: 128
    sink_tokens: 8
    protected_spans: [system, policy]
seeds: [0]
limit_per_suite: 5
